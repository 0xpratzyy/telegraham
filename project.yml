name: Pidgy
options:
  bundleIdPrefix: com.pidgy
  deploymentTarget:
    macOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  TDLibKit:
    url: https://github.com/Swiftgram/TDLibKit
    exactVersion: "1.5.2-tdlib-1.8.61-6d509061"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"

targets:
  Pidgy:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: TDLibKit
      - package: GRDB
      - package: Sentry
        product: Sentry
    configFiles:
      Debug: Config/BetaSecrets.xcconfig
      Release: Config/BetaSecrets.xcconfig
    info:
      path: Sources/App/Info.plist
      properties:
        ATSApplicationFontsPath: Fonts
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        PidgyBundledTelegramApiId: $(PIDGY_TG_API_ID)
        PidgyBundledTelegramApiHash: $(PIDGY_TG_API_HASH)
        PidgyBundledOpenAIApiKey: $(PIDGY_BUNDLED_OPENAI_API_KEY)
        PidgyBundledSentryDsn: $(PIDGY_SENTRY_DSN)
        PidgyBundledLangSmithApiKey: $(PIDGY_BUNDLED_LANGSMITH_API_KEY)
        PidgyBundledLangSmithProject: $(PIDGY_BUNDLED_LANGSMITH_PROJECT)
        PidgyBuildCommitSHA: $(PIDGY_BUILD_COMMIT_SHA)
    postBuildScripts:
      - name: Stamp commit SHA into .app sidecar file
        basedOnDependencyAnalysis: false
        # Writes the current commit SHA to a sidecar file inside the
        # built .app:  Contents/Resources/PidgyBuildSHA.txt
        # Read at runtime via Bundle.main.url(forResource:).
        #
        # Why not stamp the Info.plist directly: Xcode's modern
        # XCBuild reorders post-build scripts to run *before*
        # `ProcessInfoPlistFile` on incremental builds, so any write
        # we do to the Info.plist gets clobbered by Xcode re-emitting
        # the plist from source. The sidecar approach sidesteps that
        # entirely — Xcode doesn't manage that file, so nothing
        # overwrites it.
        #
        # Falls back to a direct `.git/HEAD` read if `git` isn't
        # available in the build shell (rare, but cheap to do).
        script: |
          set -eu
          SIDECAR_DIR="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Contents/Resources"
          SIDECAR_FILE="${SIDECAR_DIR}/PidgyBuildSHA.txt"

          resolve_sha_via_git() {
            /usr/bin/git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || true
          }

          # Handles both branch refs ("ref: refs/heads/main") and
          # detached HEAD (raw SHA in the file). Also resolves the
          # worktree case where .git is a file pointing at the
          # worktree's gitdir.
          resolve_sha_via_dotgit() {
            local head_file="${SRCROOT}/.git/HEAD"
            local git_dir="${SRCROOT}/.git"
            if [ -f "$git_dir" ]; then
              local pointer
              pointer=$(sed -n 's/^gitdir: //p' "$git_dir" 2>/dev/null || true)
              if [ -n "$pointer" ]; then
                git_dir="$pointer"
                head_file="$git_dir/HEAD"
              fi
            fi
            if [ ! -f "$head_file" ]; then
              return 0
            fi
            local content
            content=$(cat "$head_file" 2>/dev/null || true)
            case "$content" in
              ref:*)
                local ref_path="${git_dir}/${content#ref: }"
                if [ -f "$ref_path" ]; then
                  cut -c1-7 "$ref_path" 2>/dev/null || true
                fi
                ;;
              *)
                echo "$content" | cut -c1-7
                ;;
            esac
          }

          COMMIT_SHA=$(resolve_sha_via_git)
          if [ -z "$COMMIT_SHA" ]; then
            COMMIT_SHA=$(resolve_sha_via_dotgit)
          fi
          if [ -z "$COMMIT_SHA" ]; then
            COMMIT_SHA="unknown"
          fi

          mkdir -p "$SIDECAR_DIR"
          printf '%s' "$COMMIT_SHA" > "$SIDECAR_FILE"
          echo "Stamped commit SHA $COMMIT_SHA into $SIDECAR_FILE"
      - name: Upload dSYMs to Sentry
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          # Skip silently when any Sentry value is empty. Source builds
          # without telemetry credentials must still succeed end-to-end.
          if [ -z "${PIDGY_SENTRY_AUTH_TOKEN:-}" ] \
              || [ -z "${PIDGY_SENTRY_ORG:-}" ] \
              || [ -z "${PIDGY_SENTRY_PROJECT:-}" ]; then
            echo "note: Sentry dSYM upload skipped (auth_token/org/project unset)"
            exit 0
          fi
          # Xcode build shells trim PATH aggressively, so probe common
          # install locations (Homebrew + curl installer's default).
          SENTRY_CLI=""
          for candidate in /opt/homebrew/bin/sentry-cli /usr/local/bin/sentry-cli "$HOME/.local/bin/sentry-cli" "$(command -v sentry-cli 2>/dev/null || true)"; do
            if [ -n "$candidate" ] && [ -x "$candidate" ]; then
              SENTRY_CLI="$candidate"
              break
            fi
          done
          if [ -z "$SENTRY_CLI" ]; then
            echo "warning: sentry-cli not found — install via 'curl -sL https://sentry.io/get-cli/ | sh' or 'brew install getsentry/tools/sentry-cli'"
            exit 0
          fi
          export SENTRY_AUTH_TOKEN="${PIDGY_SENTRY_AUTH_TOKEN}"
          export SENTRY_ORG="${PIDGY_SENTRY_ORG}"
          export SENTRY_PROJECT="${PIDGY_SENTRY_PROJECT}"
          # Debug builds typically inline DWARF in the binary; release
          # builds produce a separate .dSYM bundle. Point sentry-cli at
          # the build dir and let it figure out which artifacts apply.
          "$SENTRY_CLI" debug-files upload \
            --include-sources \
            "${DWARF_DSYM_FOLDER_PATH}" || \
            "$SENTRY_CLI" debug-files upload \
              --include-sources \
              "${CONFIGURATION_BUILD_DIR}"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pidgy.app
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "5.10"
        PRODUCT_NAME: Pidgy
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Sources/App/Info.plist
        ENABLE_APP_SANDBOX: false
        GENERATE_INFOPLIST_FILE: false
        # Apple Developer team for the Pidgy Developer ID Application
        # certificate. Used by Release signing below. Team IDs are
        # public (visible in any signed binary) so this is safe to
        # commit.
        DEVELOPMENT_TEAM: ZCJL3LC558
        # The "Stamp commit SHA" post-build script needs to write to
        # the freshly-built Info.plist and read .git/HEAD inside the
        # source tree. Xcode 14+ ships with script sandboxing on by
        # default, which blocks both of those — the SHA stamp ended
        # up silently writing "unknown" to every build and feedback
        # in Sentry couldn't be traced to a commit. Off-target so
        # the post-build phase actually runs to completion.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          # Local iteration — ad-hoc signing is fine, no notarization,
          # no hardened runtime needed. Keeps the dev loop fast.
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: YES
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          # Distribution build — signed with the Developer ID
          # Application certificate (Apple-issued, lives in the
          # macOS Keychain), hardened runtime ON, secure timestamp
          # baked into the signature. These are the prerequisites
          # for Apple's notarization service to accept the binary.
          #
          # "Developer ID Application" is the certificate *name*;
          # Xcode resolves it to the actual cert by matching
          # DEVELOPMENT_TEAM (above). No need to paste the cert SHA
          # — Xcode picks the right one if there's only one DID
          # cert for this team in the keychain.
          CODE_SIGN_IDENTITY: Developer ID Application
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
          ENABLE_HARDENED_RUNTIME: YES
          # --timestamp asks the codesign tool to embed an Apple
          # secure timestamp into the signature. Notarization
          # *requires* a timestamped signature; without this the
          # `notarytool submit` rejects the package immediately.
          OTHER_CODE_SIGN_FLAGS: --timestamp
          # Don't inject the `com.apple.security.get-task-allow`
          # base entitlement — Apple's notarization scanner rejects
          # any binary that requests it, since it allows debuggers
          # to attach (fine for local dev, never for distribution).
          # Xcode auto-injects it unless explicitly turned off
          # here. Symptom was: `notarytool` returned status:Invalid
          # with two issues — one per architecture — saying
          # "The executable requests the com.apple.security.get-task-allow
          # entitlement."
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO

  PidgyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Pidgy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pidgy.app.tests
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "5.10"
        PRODUCT_NAME: PidgyTests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
