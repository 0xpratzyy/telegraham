name: Pidgy
options:
  bundleIdPrefix: com.pidgy
  deploymentTarget:
    macOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  TDLibKit:
    url: https://github.com/Swiftgram/TDLibKit
    exactVersion: "1.5.2-tdlib-1.8.61-6d509061"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  Pidgy:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: TDLibKit
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pidgy.app
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "5.10"
        PRODUCT_NAME: Pidgy
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_CFBundleDisplayName: Pidgy
        ENABLE_APP_SANDBOX: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
        GENERATE_INFOPLIST_FILE: true
