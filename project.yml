name: Pidgy
options:
  bundleIdPrefix: com.pidgy
  deploymentTarget:
    macOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  TDLibKit:
    url: https://github.com/Swiftgram/TDLibKit
    exactVersion: "1.5.2-tdlib-1.8.61-6d509061"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  Pidgy:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: TDLibKit
      - package: GRDB
    configFiles:
      Debug: Config/BetaSecrets.xcconfig
      Release: Config/BetaSecrets.xcconfig
    info:
      path: Sources/App/Info.plist
      properties:
        ATSApplicationFontsPath: Fonts
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        PidgyBundledTelegramApiId: $(PIDGY_TG_API_ID)
        PidgyBundledTelegramApiHash: $(PIDGY_TG_API_HASH)
        PidgyBundledOpenAIApiKey: $(PIDGY_BUNDLED_OPENAI_API_KEY)
        PidgyBuildCommitSHA: $(PIDGY_BUILD_COMMIT_SHA)
    postBuildScripts:
      - name: Stamp commit SHA into built Info.plist
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          BUILT_PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          if [ ! -f "$BUILT_PLIST" ]; then
            echo "warning: built Info.plist not found at $BUILT_PLIST"
            exit 0
          fi
          COMMIT_SHA=$(git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || echo "unknown")
          /usr/libexec/PlistBuddy -c "Set :PidgyBuildCommitSHA ${COMMIT_SHA}" "$BUILT_PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :PidgyBuildCommitSHA string ${COMMIT_SHA}" "$BUILT_PLIST"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pidgy.app
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "5.10"
        PRODUCT_NAME: Pidgy
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Sources/App/Info.plist
        ENABLE_APP_SANDBOX: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
        GENERATE_INFOPLIST_FILE: false

  PidgyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Pidgy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pidgy.app.tests
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "5.10"
        PRODUCT_NAME: PidgyTests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
