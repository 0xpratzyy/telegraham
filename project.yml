name: Pidgy
options:
  bundleIdPrefix: com.pidgy
  deploymentTarget:
    macOS: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  TDLibKit:
    url: https://github.com/Swiftgram/TDLibKit
    exactVersion: "1.5.2-tdlib-1.8.61-6d509061"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  Pidgy:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - Resources
    resources:
      - path: Sources/Resources
    dependencies:
      - package: TDLibKit
      - package: GRDB
    info:
      path: Sources/App/Info.plist
      properties:
        ATSApplicationFontsPath: Fonts
        CFBundleDisplayName: Pidgy
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: false
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pidgy.app
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "5.10"
        PRODUCT_NAME: Pidgy
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Sources/App/Info.plist
        ENABLE_APP_SANDBOX: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
        GENERATE_INFOPLIST_FILE: false

  PidgyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Pidgy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pidgy.app.tests
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "5.10"
        PRODUCT_NAME: PidgyTests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
