name: Pidgy
options:
  bundleIdPrefix: com.pidgy
  deploymentTarget:
    macOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  TDLibKit:
    url: https://github.com/Swiftgram/TDLibKit
    exactVersion: "1.5.2-tdlib-1.8.61-6d509061"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"
  # Sparkle auto-updater. Pidgy ships outside the App Store, so it
  # needs its own update mechanism — Sparkle is the de-facto choice
  # for distributing macOS app updates via DMG. App polls the
  # appcast feed (SUFeedURL), shows an in-app "Pidgy 1.0.1
  # available" dialog, downloads + EdDSA-verifies the new DMG, and
  # atomically replaces itself.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  # On-device multilingual sentence embeddings (intfloat/multilingual-
  # e5-small, XLM-RoBERTa). Pure-Swift on Apple's MLTensor — no MLX, no
  # Python. Model weights download once from Hugging Face on first use
  # (weights only, no user data leaves the machine — same shape as
  # Apple's NLContextualEmbedding asset fetch).
  SwiftEmbeddings:
    url: https://github.com/jkrukowski/swift-embeddings
    from: "0.1.0"

# Explicit shared scheme so `xcodebuild -scheme Pidgy test` behaves the
# same everywhere (CI, pre-push hook, fresh clones) instead of relying
# on Xcode's implicit scheme auto-creation, which only happens reliably
# when the project is opened in the IDE.
schemes:
  Pidgy:
    build:
      targets:
        Pidgy: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PidgyTests

targets:
  Pidgy:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: TDLibKit
      - package: GRDB
      - package: Sentry
        product: Sentry
      - package: Sparkle
        product: Sparkle
      - package: SwiftEmbeddings
        product: Embeddings
    configFiles:
      Debug: Config/BetaSecrets.xcconfig
      Release: Config/BetaSecrets.xcconfig
    info:
      path: Sources/App/Info.plist
      properties:
        ATSApplicationFontsPath: Fonts
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        PidgyBundledTelegramApiId: $(PIDGY_TG_API_ID)
        PidgyBundledTelegramApiHash: $(PIDGY_TG_API_HASH)
        PidgyBundledOpenAIApiKey: $(PIDGY_BUNDLED_OPENAI_API_KEY)
        PidgyBundledAIProxyURL: $(PIDGY_AI_PROXY_URL)
        PidgyBundledAIProxyToken: $(PIDGY_AI_PROXY_TOKEN)
        PidgyBundledDodoBaseURL: $(PIDGY_DODO_BASE_URL)
        PidgyBundledDodoCheckoutBYOK: $(PIDGY_DODO_CHECKOUT_BYOK)
        PidgyBundledDodoCheckoutBundled: $(PIDGY_DODO_CHECKOUT_BUNDLED)
        PidgyBundledDodoPortalURL: $(PIDGY_DODO_PORTAL_URL)
        PidgyBundledSentryDsn: $(PIDGY_SENTRY_DSN)
        PidgyBuildCommitSHA: $(PIDGY_BUILD_COMMIT_SHA)
        # Sparkle auto-updater wiring.
        #
        # SUPublicEDKey is the base64-encoded EdDSA public key used
        # to verify the signature on every downloaded update. Its
        # matching private key lives in the developer's Keychain
        # under the service `https://sparkle-project.org` (added by
        # Sparkle's `generate_keys` tool, never committed). Once
        # chosen the public key is effectively project-level — every
        # tester's installed Pidgy has this exact bytes embedded,
        # and only payloads signed by the matching private key
        # validate.
        #
        # SUFeedURL is the publicly-fetchable appcast. Points at
        # the raw appcast.xml hosted in the public `pidgy-releases`
        # repo — separate from the private `telegraham` source so
        # we can serve the file without leaking code.
        SUPublicEDKey: ZvPujxTMtOfaewSOF2uoCycxcjO/X5/BeqdEPVRMTn4=
        SUFeedURL: https://raw.githubusercontent.com/0xpratzyy/pidgy-releases/main/appcast.xml
        # Auto-check every 6 hours after launch; user can also
        # trigger manually via the menu. Default is 1 day, which
        # is too slow for a beta where we ship frequent fixes.
        SUScheduledCheckInterval: 21600
        SUEnableAutomaticChecks: true
    postBuildScripts:
      - name: Stamp commit SHA into .app sidecar file
        basedOnDependencyAnalysis: false
        # Writes the current commit SHA to a sidecar file inside the
        # built .app:  Contents/Resources/PidgyBuildSHA.txt
        # Read at runtime via Bundle.main.url(forResource:).
        #
        # Why not stamp the Info.plist directly: Xcode's modern
        # XCBuild reorders post-build scripts to run *before*
        # `ProcessInfoPlistFile` on incremental builds, so any write
        # we do to the Info.plist gets clobbered by Xcode re-emitting
        # the plist from source. The sidecar approach sidesteps that
        # entirely — Xcode doesn't manage that file, so nothing
        # overwrites it.
        #
        # Falls back to a direct `.git/HEAD` read if `git` isn't
        # available in the build shell (rare, but cheap to do).
        script: |
          set -eu
          SIDECAR_DIR="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Contents/Resources"
          SIDECAR_FILE="${SIDECAR_DIR}/PidgyBuildSHA.txt"

          resolve_sha_via_git() {
            /usr/bin/git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || true
          }

          # Handles both branch refs ("ref: refs/heads/main") and
          # detached HEAD (raw SHA in the file). Also resolves the
          # worktree case where .git is a file pointing at the
          # worktree's gitdir.
          resolve_sha_via_dotgit() {
            local head_file="${SRCROOT}/.git/HEAD"
            local git_dir="${SRCROOT}/.git"
            if [ -f "$git_dir" ]; then
              local pointer
              pointer=$(sed -n 's/^gitdir: //p' "$git_dir" 2>/dev/null || true)
              if [ -n "$pointer" ]; then
                git_dir="$pointer"
                head_file="$git_dir/HEAD"
              fi
            fi
            if [ ! -f "$head_file" ]; then
              return 0
            fi
            local content
            content=$(cat "$head_file" 2>/dev/null || true)
            case "$content" in
              ref:*)
                local ref_path="${git_dir}/${content#ref: }"
                if [ -f "$ref_path" ]; then
                  cut -c1-7 "$ref_path" 2>/dev/null || true
                fi
                ;;
              *)
                echo "$content" | cut -c1-7
                ;;
            esac
          }

          COMMIT_SHA=$(resolve_sha_via_git)
          if [ -z "$COMMIT_SHA" ]; then
            COMMIT_SHA=$(resolve_sha_via_dotgit)
          fi
          if [ -z "$COMMIT_SHA" ]; then
            COMMIT_SHA="unknown"
          fi

          mkdir -p "$SIDECAR_DIR"
          printf '%s' "$COMMIT_SHA" > "$SIDECAR_FILE"
          echo "Stamped commit SHA $COMMIT_SHA into $SIDECAR_FILE"
      - name: Sign Sparkle Helpers
        basedOnDependencyAnalysis: false
        # Sparkle.framework ships with nested helpers — Updater.app,
        # Autoupdate, Downloader.xpc, Installer.xpc — pre-signed by
        # the Sparkle project's release engineer, not by us. Apple's
        # notarization service rejects DMGs containing ANY nested
        # executable not signed with the submitting team's Developer
        # ID, so we re-sign each helper here with the build's
        # CODE_SIGN_IDENTITY (which is "Developer ID Application:
        # Pratyush Rungta" for Release).
        #
        # Skipped automatically for ad-hoc Debug builds (identity =
        # "-") since hardened runtime can't be applied to an
        # ad-hoc signature anyway.
        #
        # Without this script, notarytool rejects with:
        #   "The binary is not signed with a valid Developer ID
        #    certificate. ...Sparkle.framework/Versions/B/Updater.app
        #    /Contents/MacOS/Updater" (and three siblings).
        script: |
          set -eu
          # Only run for Release builds — Debug uses ad-hoc signing
          # and never goes to notarization, so re-signing Sparkle's
          # helpers is wasted work (and would fail anyway because
          # Xcode sets EXPANDED_CODE_SIGN_IDENTITY_NAME to the
          # placeholder string "Sign to Run Locally: no identity
          # found" for Debug, which codesign correctly rejects).
          if [ "${CONFIGURATION:-Debug}" != "Release" ]; then
            echo "note: Skipping Sparkle helper re-sign (Configuration=${CONFIGURATION:-Debug})"
            exit 0
          fi
          IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY_NAME:-}"
          # Resolve the codesign flags from the configured identity:
          #
          #   - Empty / "Sign to Run Locally" → skip entirely. There's
          #     no usable identity at all (this is the Debug-ish path
          #     with no signing cert provisioned). Resigning anything
          #     would fail.
          #
          #   - "-" → ad-hoc. We MUST still re-sign Sparkle here, even
          #     though notarization is irrelevant for ad-hoc builds.
          #     If we don't, the main app ships with team-id "" (the
          #     ad-hoc default) while Sparkle.framework retains the
          #     Sparkle Project's team-id from the SPM artifact, and
          #     dyld refuses to load the framework at launch with
          #     "mapping process and mapped file have different Team
          #     IDs". The crash is immediate and unrecoverable.
          #     Hardened runtime + timestamp aren't available for
          #     ad-hoc signatures, so we strip those flags.
          #
          #   - Anything else (Developer ID Application: …) → real
          #     Distribution build. Sign with hardened runtime +
          #     secure timestamp so notarytool accepts the result.
          case "$IDENTITY" in
            ""|"Sign to Run Locally"*)
              echo "note: Skipping Sparkle helper re-sign (identity=$IDENTITY)"
              exit 0
              ;;
            "-")
              SIGN_FLAGS=""
              echo "note: Ad-hoc identity — re-signing Sparkle helpers without hardened runtime"
              ;;
            *)
              SIGN_FLAGS="--options runtime --timestamp"
              ;;
          esac
          SPARKLE_PATH="${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/Frameworks/Sparkle.framework"
          if [ ! -d "$SPARKLE_PATH" ]; then
            echo "note: Sparkle.framework not embedded; nothing to sign"
            exit 0
          fi
          # Resolve `Versions/Current` (a symlink) to the actual
          # version directory — currently `B` for Sparkle 2.x, but
          # we don't hardcode in case it changes.
          CURRENT=$(readlink "$SPARKLE_PATH/Versions/Current" 2>/dev/null || echo "")
          if [ -n "$CURRENT" ]; then
            VERSION_DIR="$SPARKLE_PATH/Versions/$CURRENT"
          else
            for v in "$SPARKLE_PATH/Versions/"*/; do
              name=$(basename "$v")
              if [ "$name" != "Current" ]; then
                VERSION_DIR="${v%/}"
                break
              fi
            done
          fi
          if [ -z "${VERSION_DIR:-}" ] || [ ! -d "$VERSION_DIR" ]; then
            echo "warning: couldn't find Sparkle version dir under $SPARKLE_PATH/Versions"
            exit 0
          fi
          echo "==> Re-signing Sparkle helpers under $VERSION_DIR"
          # Sign innermost first, then outwards. The SIGN_FLAGS string
          # is intentionally word-split (no quotes) so empty = no
          # extra flags, "--options runtime --timestamp" = two flags.
          #
          # For ad-hoc we MUST strip the existing signature first.
          # The SPM Sparkle artifact comes pre-signed with hardened
          # runtime by the Sparkle project; `codesign --force` would
          # preserve the runtime flag, and dyld then refuses to load
          # the framework into an ad-hoc-signed host process (library
          # validation insists Team IDs match, two empty Team IDs
          # don't qualify). For real Developer ID builds we keep the
          # `--force` overwrite path — the new signature carries
          # --options runtime --timestamp as needed.
          for helper in \
              "$VERSION_DIR/XPCServices/Installer.xpc" \
              "$VERSION_DIR/XPCServices/Downloader.xpc" \
              "$VERSION_DIR/Autoupdate" \
              "$VERSION_DIR/Updater.app"; do
            if [ -e "$helper" ]; then
              if [ "$IDENTITY" = "-" ]; then
                codesign --remove-signature "$helper" 2>/dev/null || true
              fi
              codesign --force $SIGN_FLAGS --sign "$IDENTITY" "$helper"
              echo "    signed: $(basename "$helper")"
            fi
          done
          # Re-sign the framework itself last so its CodeResources
          # hash reflects the new inner signatures.
          if [ "$IDENTITY" = "-" ]; then
            codesign --remove-signature "$SPARKLE_PATH" 2>/dev/null || true
          fi
          codesign --force $SIGN_FLAGS --sign "$IDENTITY" "$SPARKLE_PATH"
          echo "    signed: Sparkle.framework"
      - name: Upload dSYMs to Sentry
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          # Skip silently when any Sentry value is empty. Source builds
          # without telemetry credentials must still succeed end-to-end.
          if [ -z "${PIDGY_SENTRY_AUTH_TOKEN:-}" ] \
              || [ -z "${PIDGY_SENTRY_ORG:-}" ] \
              || [ -z "${PIDGY_SENTRY_PROJECT:-}" ]; then
            echo "note: Sentry dSYM upload skipped (auth_token/org/project unset)"
            exit 0
          fi
          # Xcode build shells trim PATH aggressively, so probe common
          # install locations (Homebrew + curl installer's default).
          SENTRY_CLI=""
          for candidate in /opt/homebrew/bin/sentry-cli /usr/local/bin/sentry-cli "$HOME/.local/bin/sentry-cli" "$(command -v sentry-cli 2>/dev/null || true)"; do
            if [ -n "$candidate" ] && [ -x "$candidate" ]; then
              SENTRY_CLI="$candidate"
              break
            fi
          done
          if [ -z "$SENTRY_CLI" ]; then
            echo "warning: sentry-cli not found — install via 'curl -sL https://sentry.io/get-cli/ | sh' or 'brew install getsentry/tools/sentry-cli'"
            exit 0
          fi
          export SENTRY_AUTH_TOKEN="${PIDGY_SENTRY_AUTH_TOKEN}"
          export SENTRY_ORG="${PIDGY_SENTRY_ORG}"
          export SENTRY_PROJECT="${PIDGY_SENTRY_PROJECT}"
          # Debug builds typically inline DWARF in the binary; release
          # builds produce a separate .dSYM bundle. Point sentry-cli at
          # the build dir and let it figure out which artifacts apply.
          "$SENTRY_CLI" debug-files upload \
            --include-sources \
            "${DWARF_DSYM_FOLDER_PATH}" || \
            "$SENTRY_CLI" debug-files upload \
              --include-sources \
              "${CONFIGURATION_BUILD_DIR}"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pidgy.app
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "5.10"
        PRODUCT_NAME: Pidgy
        MARKETING_VERSION: "1.0.15"
        # CFBundleVersion — Sparkle's PRIMARY update comparator. It
        # compares this integer (exposed as sparkle:version in the
        # appcast), NOT the marketing string. It MUST increase by at
        # least 1 every release or Sparkle treats the new build as
        # "not newer" and silently offers no update. Was stuck at 1
        # for 1.0.0–1.0.3, which is why none of them could auto-update
        # to each other. Bump this on every single release.
        #   1.0.0–1.0.3 → 1   (broken: all equal)
        #   1.0.4       → 2
        #   1.0.5       → 3
        #   1.0.6       → 4
        #   1.0.7       → 5
        #   1.0.8       → 6
        #   1.0.9       → 7
        #   1.0.10      → 8
        #   1.0.11      → 9
        #   1.0.12      → 10
        #   1.0.13      → 11
        #   1.0.14      → 12
        #   1.0.15      → 13
        CURRENT_PROJECT_VERSION: 13
        INFOPLIST_FILE: Sources/App/Info.plist
        ENABLE_APP_SANDBOX: false
        GENERATE_INFOPLIST_FILE: false
        # Apple Developer team for the Pidgy Developer ID Application
        # certificate. Used by Release signing below. Team IDs are
        # public (visible in any signed binary) so this is safe to
        # commit.
        DEVELOPMENT_TEAM: ZCJL3LC558
        # The "Stamp commit SHA" post-build script needs to write to
        # the freshly-built Info.plist and read .git/HEAD inside the
        # source tree. Xcode 14+ ships with script sandboxing on by
        # default, which blocks both of those — the SHA stamp ended
        # up silently writing "unknown" to every build and feedback
        # in Sentry couldn't be traced to a commit. Off-target so
        # the post-build phase actually runs to completion.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          # Local iteration — ad-hoc signing is fine, no notarization,
          # no hardened runtime needed. Keeps the dev loop fast.
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: YES
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          # Distribution build — signed with the Developer ID
          # Application certificate (Apple-issued, lives in the
          # macOS Keychain), hardened runtime ON, secure timestamp
          # baked into the signature. These are the prerequisites
          # for Apple's notarization service to accept the binary.
          #
          # "Developer ID Application" is the certificate *name*;
          # Xcode resolves it to the actual cert by matching
          # DEVELOPMENT_TEAM (above). No need to paste the cert SHA
          # — Xcode picks the right one if there's only one DID
          # cert for this team in the keychain.
          CODE_SIGN_IDENTITY: Developer ID Application
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
          ENABLE_HARDENED_RUNTIME: YES
          # --timestamp asks the codesign tool to embed an Apple
          # secure timestamp into the signature. Notarization
          # *requires* a timestamped signature; without this the
          # `notarytool submit` rejects the package immediately.
          OTHER_CODE_SIGN_FLAGS: --timestamp
          # Don't inject the `com.apple.security.get-task-allow`
          # base entitlement — Apple's notarization scanner rejects
          # any binary that requests it, since it allows debuggers
          # to attach (fine for local dev, never for distribution).
          # Xcode auto-injects it unless explicitly turned off
          # here. Symptom was: `notarytool` returned status:Invalid
          # with two issues — one per architecture — saying
          # "The executable requests the com.apple.security.get-task-allow
          # entitlement."
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO

  PidgyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Pidgy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pidgy.app.tests
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "5.10"
        PRODUCT_NAME: PidgyTests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
